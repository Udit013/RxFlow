version: '3.8'

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rxflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rxflow
      POSTGRES_PASSWORD: rxflow_dev_secret
      POSTGRES_DB: rxflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rxflow']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Meilisearch ───────────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: rxflow-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: rxflow_meili_key
      MEILI_NO_ANALYTICS: 'true'
    ports:
      - '7700:7700'
    volumes:
      - meilisearch_data:/meili_data

  # ── Redis (for caching / sessions) ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rxflow-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # ── MinIO (local S3-compatible storage) ───────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: rxflow-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: rxflow
      MINIO_ROOT_PASSWORD: rxflow_minio_secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ':9001'

volumes:
  postgres_data:
  meilisearch_data:
  redis_data:
  minio_data:

networks:
  default:
    name: rxflow-network
